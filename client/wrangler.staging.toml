"$schema" = "./node_modules/wrangler/config-schema.json"
name = "zemonie-web-staging"
compatibility_date = "2026-04-03"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[vars]
VITE_SERVER_URL = "https://staging.api.zemonie.site"

[[routes]]
pattern = "staging.www.zemonie.site"
custom_domain = true
