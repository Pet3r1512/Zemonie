name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies (root workspace)
        run: pnpm install

      # SERVER
      - name: Generate Prisma client
        run: pnpm --dir server prisma generate

      - name: Typecheck server
        run: npx tsc --project server/tsconfig.json --noEmit

      # CLIENT
      - name: Install Playwright browsers
        run: cd client && pnpm exec playwright install

      - name: Test client
        run: pnpm --dir client test

      - name: Build client
        run: pnpm --dir client build
