name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      # SERVER
      - name: Install server dependencies
        run: cd server && pnpm install

      - name: Generate Prisma client
        run: cd server && pnpm prisma generate

      - name: Typecheck server
        run: cd server && pnpm exec tsc --noEmit

      # CLIENT
      - name: Install client dependencies
        run: cd client && pnpm install

      - name: Install Playwright browsers
        run: cd client && pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Start Storybook
        run: |
          pnpm storybook --no-open &
          for i in $(seq 1 30); do
            if curl -s http://localhost:6006 > /dev/null 2>&1; then
              echo "Storybook ready"
              break
            fi
            sleep 2
          done
        working-directory: client

      - name: Test client
        run: pnpm test
        working-directory: client
        env:
          STORYBOOK_URL: http://localhost:6006

      - name: Build client
        run: pnpm build
        working-directory: client
