name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install client dependencies
        run: cd client && pnpm install

      - uses: millionco/react-doctor@v1
        with:
          directory: client

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      # SERVER
      - name: Install server dependencies
        run: cd server && pnpm install

      - name: Generate Prisma client
        run: cd server && pnpm prisma generate

      - name: Typecheck server
        run: cd server && pnpm exec tsc --noEmit

      # LINT & FORMAT
      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format

      # CLIENT
      - name: Install client dependencies
        run: cd client && pnpm install

      - name: Install Playwright browsers
        run: cd client && pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Start Storybook
        run: |
          pnpm storybook --no-open &
          for i in $(seq 1 30); do
            if curl -s http://localhost:6006 > /dev/null 2>&1; then
              echo "Storybook ready"
              break
            fi
            sleep 2
          done
        working-directory: client

      - name: Test client
        run: pnpm test
        working-directory: client
        env:
          STORYBOOK_URL: http://localhost:6006

  build:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install client dependencies
        run: cd client && pnpm install

      - name: Build client
        run: pnpm build
        working-directory: client

  deploy-staging:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      # Deploy server
      - name: Install server dependencies
        run: cd server && pnpm install

      - name: Generate Prisma client
        run: cd server && pnpm prisma generate

      - name: Deploy server to staging
        run: |
          export CLOUDFLARE_API_TOKEN
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > .secrets.env
          printf 'BETTER_AUTH_SECRET=%s\n' "$BETTER_AUTH_SECRET" >> .secrets.env
          printf 'BETTER_AUTH_URL=%s\n' "$BETTER_AUTH_URL" >> .secrets.env
          printf 'TRUSTED_ORIGINS=%s\n' "$TRUSTED_ORIGINS" >> .secrets.env
          pnpm wrangler deploy --minify --config wrangler.staging.jsonc --secrets-file .secrets.env
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL_STAGING }}
          TRUSTED_ORIGINS: ${{ secrets.TRUSTED_ORIGINS_STAGING }}

      # Deploy client
      - name: Install client dependencies
        run: cd client && pnpm install

      - name: Build client
        run: pnpm build
        working-directory: client

      - name: Deploy client to staging
        run: pnpm wrangler deploy --minify --config wrangler.staging.toml
        working-directory: client
        env:
          VITE_SERVER_URL: https://staging.api.zemonie.site
