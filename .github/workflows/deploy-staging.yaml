name: Deploy Staging

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

concurrency:
  group: staging-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm prisma generate

      - name: Deploy server to staging
        run: |
          pnpm wrangler deploy --minify --config wrangler.staging.jsonc \
            --secret DATABASE_URL \
            --secret BETTER_AUTH_SECRET \
            --secret BETTER_AUTH_URL \
            --secret TRUSTED_ORIGINS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL_STAGING }}
          TRUSTED_ORIGINS: ${{ secrets.TRUSTED_ORIGINS_STAGING }}

  deploy-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install

      - name: Build and deploy client to staging
        run: |
          pnpm build
          pnpm wrangler deploy --minify --config wrangler.staging.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VITE_SERVER_URL: https://staging.api.zemonie.site
