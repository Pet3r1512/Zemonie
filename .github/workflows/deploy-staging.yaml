name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: cd client && pnpm exec playwright install

      - name: Test client (gate before deploy)
        run: pnpm --dir client test

      # ── Server ──────────────────────────────────────────────────────────────
      - name: Deploy server to staging
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm deploy:staging

      - name: Set staging server secrets
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.STAGING_DATABASE_URL }}" | npx wrangler secret put DATABASE_URL --name zemonie-server-staging
          echo "${{ secrets.STAGING_BETTER_AUTH_SECRET }}" | npx wrangler secret put BETTER_AUTH_SECRET --name zemonie-server-staging

      # ── Client ──────────────────────────────────────────────────────────────
      - name: Build & deploy client to staging
        working-directory: client
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm deploy:staging
